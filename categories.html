<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORDO</title>
<style>
body {
  margin: 0;
  /* Matching your main mesh theme */
  background: radial-gradient(at 0% 0%, rgba(45, 90, 255, 0.1) 0px, transparent 50%), #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100dvh;
}

.container { padding: 30px 20px; }

.title {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 25px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.9);
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.card {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 20px;
  overflow: hidden;
  backdrop-filter: blur(10px);
  transition: transform 0.2s ease;
}

.card:active { transform: scale(0.96); }

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  /* Blends the bottom of the image into the card */
  mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
}

.info { padding: 15px; }

.name { font-size: 14px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.price { font-size: 13px; color: rgba(120, 180, 255, 1); font-weight: 600; margin-bottom: 10px; }

.buy {
  padding: 10px;
  width: 100%;
  border: none;
  background: white;
  color: black;
  border-radius: 12px;
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
</style>

</head>

<body>

<div class="container">
  <div class="title" id="title"></div>
  <div class="grid" id="grid"></div>
</div>

<script src="products.js"></script>

<script>
let currentType = "hoodies";

const titleEl = document.getElementById("title");
const grid = document.getElementById("grid");

// 🔥 LOAD CATEGORY (DYNAMIC)
function loadCategory(type) {
  currentType = type;

  titleEl.innerText = type;
  grid.innerHTML = ""; // clear old products

  const items = PRODUCTS[type];

  // 🔊 Voice feedback
  setTimeout(() => {
    speak("Showing " + type);
  }, 300);

  items.forEach(product => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${product.image}">
      <div class="info">
        <div class="name">${product.name}</div>
        <div class="price">${product.price}</div>
        <button class="buy">Buy</button>
      </div>
    `;

    grid.appendChild(card);
  });
}

// 🔊 AI VOICE
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-GB";
  speech.rate = 0.95;
  speech.pitch = 0.9;
  window.speechSynthesis.speak(speech);
}

// 👇 INITIAL LOAD
const saved = localStorage.getItem("category") || "hoodies";
loadCategory(saved);
</script>
</body>
</html>
