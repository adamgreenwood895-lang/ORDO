<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORDO | Categories</title>
<style>
body {
  margin: 0;
  /* Using your high-res background with a dark tint for premium depth */
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
              url("./assets/backgroundnewclear1.png");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100dvh;
}

.container { padding: 40px 20px; }

.title {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 30px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #fff;
  /* Subtle neon glow to match the orb */
  text-shadow: 0 0 15px rgba(120, 180, 255, 0.4);
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.card {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  overflow: hidden;
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.card:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

.card img {
  width: 100%;
  height: 170px;
  object-fit: cover;
  display: block;
  mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
}

.info { padding: 16px; }

.name { 
  font-size: 13px; 
  font-weight: 500; 
  margin-bottom: 4px; 
  opacity: 0.9;
  white-space: nowrap; 
  overflow: hidden; 
  text-overflow: ellipsis; 
}

.price { 
  font-size: 14px; 
  color: rgba(120, 180, 255, 1); 
  font-weight: 700; 
  margin-bottom: 12px; 
}

.buy {
  padding: 12px;
  width: 100%;
  border: none;
  background: #fff;
  color: #000;
  border-radius: 14px;
  font-weight: 800;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="title" id="title"></div>
  <div class="grid" id="grid"></div>
</div>

<script src="products.js"></script>

<script>
let currentType = "hoodies";
const titleEl = document.getElementById("title");
const grid = document.getElementById("grid");

function loadCategory(type) {
  currentType = type;
  titleEl.innerText = type;
  grid.innerHTML = ""; 

  // Accessing PRODUCTS from products.js
  const items = PRODUCTS[type];

  setTimeout(() => { speak("Showing " + type); }, 300);

  items.forEach(product => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${product.image}" loading="lazy">
      <div class="info">
        <div class="name">${product.name}</div>
        <div class="price">${product.price}</div>
        <button class="buy">View Details</button>
      </div>
    `;

    // 🔥 Added logic to save selection and go to confirm screen
    card.querySelector(".buy").onclick = () => {
      localStorage.setItem("selectedProduct", JSON.stringify(product));
      window.location.href = "confirm.html";
    };

    grid.appendChild(card);
  });
}

function speak(text) {
  window.speechSynthesis.cancel(); // Clear queue
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-GB";
  speech.rate = 0.95;
  window.speechSynthesis.speak(speech);
}

const saved = localStorage.getItem("category") || "hoodies";
loadCategory(saved);
</script>
</body>
</html>
