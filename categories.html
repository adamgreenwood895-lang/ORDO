<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORDO</title>
<style>
body {
  margin: 0;
  /* Premium Mesh Background */
  background: radial-gradient(at 0% 0%, rgba(45, 90, 255, 0.15) 0px, transparent 50%),
              radial-gradient(at 100% 100%, rgba(120, 180, 255, 0.1) 0px, transparent 50%),
              #030305;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100dvh;
}

.container {
  padding: 30px 20px;
}

.title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 30px;
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(255,255,255,0.2);
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.card {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  overflow: hidden;
  backdrop-filter: blur(12px);
  transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.card:active {
  transform: scale(0.96) translateY(4px);
  background: rgba(255, 255, 255, 0.08);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  /* Subtle fade on the bottom of the image */
  mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
}

.info {
  padding: 14px;
}

.name {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.price {
  font-size: 13px;
  color: rgba(120, 180, 255, 0.9);
  font-weight: 600;
  margin-bottom: 12px;
}

.buy {
  padding: 10px;
  width: 100%;
  border: none;
  background: #fff;
  color: #000;
  border-radius: 12px;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
</style>

</head>

<body>

<div class="container">
  <div class="title" id="title"></div>
  <div class="grid" id="grid"></div>
</div>

<script src="products.js"></script>

<script>
let currentType = "hoodies";

const titleEl = document.getElementById("title");
const grid = document.getElementById("grid");

// 🔥 LOAD CATEGORY (DYNAMIC)
function loadCategory(type) {
  currentType = type;

  titleEl.innerText = type;
  grid.innerHTML = ""; // clear old products

  const items = PRODUCTS[type];

  // 🔊 Voice feedback
  setTimeout(() => {
    speak("Showing " + type);
  }, 300);

  items.forEach(product => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${product.image}">
      <div class="info">
        <div class="name">${product.name}</div>
        <div class="price">${product.price}</div>
        <button class="buy">Buy</button>
      </div>
    `;

    grid.appendChild(card);
  });
}

// 🔊 AI VOICE
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-GB";
  speech.rate = 0.95;
  speech.pitch = 0.9;
  window.speechSynthesis.speak(speech);
}

// 👇 INITIAL LOAD
const saved = localStorage.getItem("category") || "hoodies";
loadCategory(saved);
</script>
</body>
</html>
