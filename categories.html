<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORDO | Categories</title>
<link rel="stylesheet" href="style.css?v=12">

<style>
/* 2. Specific Grid fixes for this page only */
.container { 
  padding: 80px 20px 40px; 
  height: 100vh;
  overflow-y: auto; /* Allows scrolling if you have many products */
}

.title {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 30px;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-shadow: 0 0 15px rgba(120, 180, 255, 0.4);
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  padding-bottom: 50px;
}

/* We use a different class 'grid-card' to avoid conflicts with 'product-card' */
.grid-card {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  overflow: hidden;
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  transition: transform 0.2s ease;
}

.grid-card:active { transform: scale(0.96); }

.grid-card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
}

.info { padding: 15px; }

.name { font-size: 13px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.price { font-size: 14px; color: rgba(120, 180, 255, 1); font-weight: 700; margin-bottom: 12px; }

.buy-btn {
  padding: 10px;
  width: 100%;
  border: none;
  background: white;
  color: black;
  border-radius: 12px;
  font-weight: 800;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
</style>
</head>

<body class="bg-landing">

<header style="position: fixed; top: 0; width: 100%; padding: 20px; z-index: 100;">
    <div onclick="window.location.href='index.html'" style="cursor: pointer; opacity: 0.6; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;">
      ← Back
    </div>
</header>

<div class="container">
  <div class="title" id="title"></div>
  <div class="grid" id="grid"></div>
</div>

<script>
// 4. EMBEDDED DATA (Ensures it works even if products.js fails to load)
const PRODUCTS_DATA = {
  hoodies: [
    { image: "assets/hoodies/hoodie1.jpg", name: "Black Essential Hoodie", price: "£60" },
    { image: "assets/hoodies/hoodie2.jpg", name: "Stone Oversized Hoodie", price: "£68" },
    { image: "assets/hoodies/hoodie3.jpg", name: "Grey Signature Hoodie", price: "£72" },
    { image: "assets/hoodies/hoodie4.jpg", name: "White Minimal Hoodie", price: "£65" }
  ],
  tracksuits: [
    { image: "assets/tracksuits/tracksuit1.jpg", name: "Black Performance", price: "£120" },
    { image: "assets/tracksuits/tracksuit2.jpg", name: "Grey Tech Set", price: "£128" }
  ],
  bags: [
    { image: "assets/bags/bag1.jpg", name: "Black Crossbody", price: "£45" },
    { image: "assets/bags/bag2.jpg", name: "Utility Backpack", price: "£58" }
  ],
  tshirts: [
    { image: "assets/tshirts/tshirt1.jpg", name: "White Core Tee", price: "£25" },
    { image: "assets/tshirts/tshirt2.jpg", name: "Black Oversized Tee", price: "£28" }
  ]
};

const titleEl = document.getElementById("title");
const grid = document.getElementById("grid");

function loadCategory(type) {
  titleEl.innerText = type;
  grid.innerHTML = ""; 

  // Use the local object to prevent 'PRODUCTS is not defined' errors
  const items = PRODUCTS_DATA[type] || PRODUCTS_DATA.hoodies;

  items.forEach(product => {
    const card = document.createElement("div");
    card.className = "grid-card";

    card.innerHTML = `
      <img src="${product.image}">
      <div class="info">
        <div class="name">${product.name}</div>
        <div class="price">${product.price}</div>
        <button class="buy-btn">Buy</button>
      </div>
    `;

    // Save selection and go to confirm page
    card.onclick = () => {
      localStorage.setItem("selectedProduct", JSON.stringify(product));
      window.location.href = "confirm.html";
    };

    grid.appendChild(card);
  });
}

// 5. INITIAL LOAD
const saved = localStorage.getItem("category") || "hoodies";
loadCategory(saved);
</script>
</body>
</html>
