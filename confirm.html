<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Order</title>

  <style>
  body {
    margin: 0;
    /* Use dvh to prevent mobile browser bars from squashing the layout */
    height: 100dvh; 
    background: #000;
    font-family: -apple-system, sans-serif;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px; /* Reduced padding for more room */
    box-sizing: border-box;
    overflow: hidden; /* Prevents the body from scrolling */
  }

  .confirm-card {
    width: 100%;
    /* Reduced max-width slightly to feel more 'mobile-native' */
    max-width: 340px; 
    max-height: 90dvh; /* Ensures the card never grows taller than the screen */
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    overflow-y: auto; /* Allows scrolling INSIDE the card if content is long */
    backdrop-filter: blur(18px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    display: flex;
    flex-direction: column;
  }

  .confirm-card img {
    width: 100%;
    /* Changed from 420px to a proportional height */
    height: 280px; 
    object-fit: cover;
    display: block;
    flex-shrink: 0; /* Prevents image from squashing when text is long */
  }

  .content {
    padding: 20px; /* Tighter padding */
  }

  h1 {
    margin: 0 0 12px;
    font-size: 24px; /* Slightly smaller header */
    font-weight: 600;
  }

  .name {
    font-size: 18px;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .price {
    color: rgba(255,255,255,0.7);
    margin-bottom: 16px;
    font-size: 15px;
  }

  .meta {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 14px;
    margin-bottom: 20px;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .buttons {
    display: flex;
    gap: 10px;
  }

  button {
    flex: 1;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .back { background: rgba(255,255,255,0.1); color: white; }
  .continue { background: white; color: black; }
</style>
</head>
<body>

  <div class="confirm-card" id="confirmCard"></div>

  <script>
    const product = JSON.parse(localStorage.getItem("selectedProduct"));

    if (!product) {
      window.location.href = "products.html";
    }

    const sizes = ["Small", "Medium", "Large"];
    const colours = ["Black", "Grey", "White"];
    const delivery = ["Tomorrow", "Friday", "2–3 Days"];

    const randomSize = sizes[Math.floor(Math.random() * sizes.length)];
    const randomColour = colours[Math.floor(Math.random() * colours.length)];
    const randomDelivery = delivery[Math.floor(Math.random() * delivery.length)];

    document.getElementById("confirmCard").innerHTML = `
      <img src="${product.image}" alt="${product.name}">

      <div class="content">
        <h1>Confirm Order</h1>

        <div class="name">${product.name}</div>
        <div class="price">${product.price}</div>

        <div class="meta">
          <div class="meta-row">
            <span class="meta-label">Size</span>
            <span>${randomSize}</span>
          </div>

          <div class="meta-row">
            <span class="meta-label">Colour</span>
            <span>${randomColour}</span>
          </div>

          <div class="meta-row">
            <span class="meta-label">Delivery</span>
            <span>${randomDelivery}</span>
          </div>
        </div>

        <div class="buttons">
          <button class="back" id="backButton">Back</button>
          <button class="continue" id="continueButton">Continue</button>
        </div>
      </div>
    `;

    document.getElementById("backButton").onclick = () => {
      window.location.href = "products.html";
    };

    document.getElementById("continueButton").onclick = () => {
      // Confirm page always goes to payment first
      window.location.href = "payment.html";
    };
  </script>

</body>
</html>
