<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORDO | Selection</title>
  <link rel="stylesheet" href="style.css?v=11">
</head>
<body class="bg-landing">

  <header style="position: fixed; top: 0; width: 100%; padding: 20px; z-index: 100; display: flex; align-items: center;">
    <div onclick="window.location.href='index.html'" style="cursor: pointer; opacity: 0.6; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;">
      ← Back
    </div>
  </header>

  <div class="products-page">
    <div class="category-title" id="categoryTitle"></div>

    <div class="product-stage" id="productStage"></div>
  </div>

  <script>
    // 1. DATA INITIALIZATION
    const category = localStorage.getItem("category") || "hoodies";
    const categoryTitle = document.getElementById("categoryTitle");
    const productStage = document.getElementById("productStage");

    categoryTitle.textContent = category;

    const products = {
      hoodies: [
        { image: "assets/hoodies/hoodie1.jpg", name: "Black Essential Hoodie", price: "£60" },
        { image: "assets/hoodies/hoodie2.jpg", name: "Stone Oversized Hoodie", price: "£68" },
        { image: "assets/hoodies/hoodie3.jpg", name: "Grey Signature Hoodie", price: "£72" },
        { image: "assets/hoodies/hoodie4.jpg", name: "White Minimal Hoodie", price: "£65" }
      ],
      tracksuits: [
        { image: "assets/tracksuits/tracksuit1.jpg", name: "Black Performance Tracksuit", price: "£120" },
        { image: "assets/tracksuits/tracksuit2.jpg", name: "Grey Tech Tracksuit", price: "£128" },
        { image: "assets/tracksuits/tracksuit3.jpg", name: "Stone Zip Tracksuit", price: "£132" },
        { image: "assets/tracksuits/tracksuit4.jpg", name: "Midnight Slim Tracksuit", price: "£138" }
      ],
      bags: [
        { image: "assets/bags/bag1.jpg", name: "Black Crossbody Bag", price: "£45" },
        { image: "assets/bags/bag2.jpg", name: "Utility Backpack", price: "£58" },
        { image: "assets/bags/bag3.jpg", name: "Travel Holdall", price: "£72" },
        { image: "assets/bags/bag4.jpg", name: "Minimal Side Bag", price: "£52" }
      ],
      tshirts: [
        { image: "assets/tshirts/tshirt1.jpg", name: "White Core T-Shirt", price: "£25" },
        { image: "assets/tshirts/tshirt2.jpg", name: "Black Oversized T-Shirt", price: "£28" },
        { image: "assets/tshirts/tshirt3.jpg", name: "Stone Premium Tee", price: "£30" },
        { image: "assets/tshirts/tshirt4.jpg", name: "Graphic Signature Tee", price: "£34" }
      ]
    };

    const selectedProducts = products[category] || products.hoodies;

    // 2. RENDER CARDS
    selectedProducts.forEach((product, index) => {
      const card = document.createElement("div");
      // The CSS 'active' class handles the fade-in and scale-up animation
      card.className = `product-card ${index === 0 ? "active" : ""}`;

      card.innerHTML = `
        <img src="${product.image}" alt="${product.name}" loading="eager">
        <div class="product-info">
          <div class="product-name">${product.name}</div>
          <div class="product-price">${product.price}</div>
          <button class="buy-button">Secure Item</button>
        </div>
      `;

      const buyButton = card.querySelector(".buy-button");
      buyButton.addEventListener("click", () => {
        localStorage.setItem("selectedProduct", JSON.stringify(product));
        window.location.href = "confirm.html";
      });

      productStage.appendChild(card);
    });

    // 3. ROTATION LOGIC
    const cards = document.querySelectorAll(".product-card");
    let currentIndex = 0;
    let rotationTimer = null;

    function rotateProducts() {
      if (cards.length === 0) return;
      
      cards[currentIndex].classList.remove("active");
      currentIndex = (currentIndex + 1) % cards.length;
      cards[currentIndex].classList.add("active");
    }

    // Auto-rotate every 5 seconds if there's more than one product
    if (cards.length > 1) {
      rotationTimer = setInterval(rotateProducts, 5000);
    }

    // Voice prompt for the product list
    window.onload = () => {
      const speech = new SpeechSynthesisUtterance(`Exploring ${category} collection.`);
      speech.lang = "en-GB";
      speech.rate = 0.9;
      window.speechSynthesis.speak(speech);
    };
  </script>

</body>
</html>
